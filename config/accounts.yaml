# Accounts definition (no secrets).
# For each account, add its api_key and api_url to WAKEUP_ACCOUNTS (GitHub Secret / .env).
#
# Supported provider values:
#   - openai-compatible  OpenAI-compatible /v1/chat/completions endpoint. Default.
#   - openai-responses   Official OpenAI Responses API via @ai-sdk/openai.
#   - anthropic          Official Anthropic Messages API via @ai-sdk/anthropic.

accounts:
  - name: "cc"
    provider: "openai-compatible"
    model: "claude-sonnet-4-6"
    messages:
      - role: "user"
        content: "ping"

  - name: "opencode-go"
    provider: "openai-compatible"
    model: "deepseek-v4-flash"
    messages:
      - role: "user"
        content: "ping"

#   Example: official OpenAI Responses API (no api_url needed)

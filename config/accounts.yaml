# Accounts definition. Secrets go to GitHub Secrets / .env, never here.
#
# For each account, set env vars:
#   WAKEUP_<NAME>_API_KEY   (required for all providers)
#   WAKEUP_<NAME>_API_URL   (required for openai-compatible; optional for others)
#
# Supported provider values:
#   - openai-compatible  OpenAI-compatible /v1/chat/completions endpoint. Default.
#   - openai-responses   Official OpenAI Responses API via @ai-sdk/openai.
#   - anthropic          Official Anthropic Messages API via @ai-sdk/anthropic.

accounts:
  - name: "codex"
    provider: "openai-compatible"
    model: "gpt-5.4"
    messages:
      - role: "user"
        content: "ping"

  - name: "cc"
    provider: "openai-compatible"
    model: "claude-sonnet-4-6"
    messages:
      - role: "user"
        content: "ping"

#   Example: official OpenAI Responses API (no base_url needed)
#   - name: "openai"
#     provider: "openai-responses"
#     model: "gpt-4.1"

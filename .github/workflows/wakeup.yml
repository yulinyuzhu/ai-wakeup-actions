name: AI Subscription Timer Wakeup

on:
  schedule:
    # Convert your local time to UTC. GitHub cron is always UTC.
    # Always remember that Github has delay on these schedules, probably hours.
    # - cron: "2 0 * * *"
    # - cron: "3 5 * * *"
    # - cron: "4 10 * * *"
    # - cron: "5 15 * * *"
  workflow_dispatch:

jobs:
  wakeup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun run once
        env:
          WAKEUP_ACCOUNTS: ${{ secrets.WAKEUP_ACCOUNTS }}
          TZ: Europe/Berlin
          ACCOUNTS_PATH: config/accounts.yaml

name: AI Subscription Timer Wakeup

on:
  schedule:
    # GitHub cron runs in UTC. Convert your local time to UTC to set these.
    # Example below: local 10:00 (UTC+8) → UTC 02:00 → cron "0 2 * * *"
    # See README for a DST / timezone reference table.
    - cron: "2 2 * * *"
      timezone: "Europe/Berlin"
    # Single Use Test
    - cron: "30 2 * * *"
      timezone: "Europe/Berlin"
    - cron: "43 2 * * *"
      timezone: "Europe/Berlin"
    - cron: "3 7 * * *"
      timezone: "Europe/Berlin"
    - cron: "4 12 * * *"
      timezone: "Europe/Berlin"
    - cron: "5 17 * * *"
      timezone: "Europe/Berlin"
  workflow_dispatch:

jobs:
  wakeup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun run once
        env:
          WAKEUP_ACCOUNTS: ${{ secrets.WAKEUP_ACCOUNTS }}
          TZ: Europe/Berlin
          ACCOUNTS_PATH: config/accounts.yaml

name: AI Subscription Timer Wakeup

on:
  schedule:
    # Convert your local time to UTC. GitHub cron is always UTC.
    # Berlin → UTC: 02:00→00:00  07:01→05:01  12:02→10:02  17:03→15:03  (CEST/UTC+2)
    - cron: "2 0 * * *"
    - cron: "3 5 * * *"
    - cron: "4 10 * * *"
    - cron: "5 15 * * *"
  workflow_dispatch:

jobs:
  wakeup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun run once
        env:
          WAKEUP_ACCOUNTS: ${{ secrets.WAKEUP_ACCOUNTS }}
          TZ: Europe/Berlin
          ACCOUNTS_PATH: config/accounts.yaml
